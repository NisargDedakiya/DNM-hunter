<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="DNM-Hunter">
  <!-- DNM-Hunter emblem: a hooded hunter framed in a targeting reticle, with a
       crest shield ("DNM" + target). Red/black esports mark on any background. -->
  <defs>
    <linearGradient id="hoodShade" x1="128" y1="40" x2="128" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0b0d"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>
  </defs>

  <!-- targeting reticle -->
  <g stroke="#e11221" fill="none">
    <circle cx="128" cy="126" r="112" stroke-width="6" stroke-dasharray="150 26 300 26 300 26" stroke-dashoffset="75"/>
    <g stroke-width="8" stroke-linecap="round">
      <path d="M128 8 L128 44"/>
      <path d="M128 208 L128 244"/>
      <path d="M16 126 L46 126"/>
      <path d="M210 126 L240 126"/>
    </g>
  </g>

  <!-- hood + shoulders (dark cloth, red edge) -->
  <path d="M128 40
           C158 46 175 70 181 104
           C186 138 183 172 170 196
           L150 196
           C153 162 147 140 128 136
           C109 140 103 162 106 196
           L86 196
           C73 172 70 138 75 104
           C81 70 98 46 128 40 Z"
        fill="url(#hoodShade)" stroke="#e11221" stroke-width="6" stroke-linejoin="round"/>

  <!-- face opening (kept dark) -->
  <path d="M128 150
           C110 150 99 134 99 112
           C99 92 112 78 128 78
           C144 78 157 92 157 112
           C157 134 146 150 128 150 Z"
        fill="#050506"/>

  <!-- angular eyes -->
  <g fill="#e11221">
    <path d="M110 104 L126 114 L124 126 L108 116 Z"/>
    <path d="M146 104 L130 114 L132 126 L148 116 Z"/>
  </g>

  <!-- crest shield over the chest -->
  <path d="M128 150 L166 162 L166 190 C166 208 149 219 128 226 C107 219 90 208 90 190 L90 162 Z"
        fill="#0b0b0d" stroke="#e11221" stroke-width="5" stroke-linejoin="round"/>
  <text x="128" y="182" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="26" font-weight="800" letter-spacing="0.5" fill="#e11221">DNM</text>
  <g stroke="#e11221" stroke-width="3" fill="none">
    <circle cx="128" cy="202" r="9"/>
    <circle cx="128" cy="202" r="2.4" fill="#e11221" stroke="none"/>
    <path d="M128 189 L128 195 M128 209 L128 215 M115 202 L121 202 M135 202 L141 202" stroke-linecap="round"/>
  </g>
</svg>
